name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcc
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: mcc/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # storage + daemon tests. The daemon runs against the synthetic frame
      # source, so CI needs fastapi/opencv but NOT ultralytics/torch -- headless
      # opencv avoids the libGL requirement of the full build. Model- and
      # camera-dependent code (Phase 2b-ii) stays out of CI, verified locally.
      - run: pip install pytest httpx fastapi "uvicorn[standard]" numpy opencv-python-headless
      - run: pytest test_storage.py test_daemon.py -q
