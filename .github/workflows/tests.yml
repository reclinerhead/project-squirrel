name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  Tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcc
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: mcc/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
