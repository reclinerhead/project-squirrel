name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcc
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: mcc/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  web-music:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: music
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: music/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # The full pure-logic suite: storage, perception bookkeeping, the daemon
      # against the synthetic frame source, narrator pacing/templates, the
      # replay timing math, the music catalog's identity/cache rules, and the
      # import boundary merle's two-package venv depends on. CI needs
      # fastapi/opencv/paho/yaml but NOT ultralytics/torch -- headless opencv
      # avoids the libGL requirement of the full build. Model- and
      # camera-dependent code stays out of CI, verified locally. (Deps listed
      # inline rather than requirements.txt precisely because of the
      # opencv-python -> headless swap.)
      #
      # THIS LIST IS THE WHOLE CONTRACT: there is no pytest.ini/testpaths
      # fallback, so a test_*.py that isn't named here silently never runs and
      # CI goes green having tested nothing. Add new files by hand.
      # (test_bus.py and test_frame_archiver.py joined the list in #123 -- they
      # had existed for months and never once run here.)
      # pillow: test_music_art.py exercises the real resize path (issue #153).
      - run: pip install pytest httpx fastapi "uvicorn[standard]" numpy opencv-python-headless paho-mqtt pyyaml pillow
      # test_music_analyze.py needs no librosa/ffmpeg: the analyzer imports the
      # beat tracker lazily inside estimate_bpm() precisely so its pure half --
      # the parsing and arithmetic that are actually worth testing -- stays
      # importable on a box (like this one) that has neither.
      - run: pytest test_storage.py test_perception.py test_daemon.py test_frames.py test_narrator.py test_weather.py test_weather_archive.py test_replay.py test_make_2class.py test_music_catalog.py test_music_index.py test_music_daemon.py test_music_cache.py test_music_art.py test_music_analyze.py test_music_playlist.py test_bus.py test_frame_archiver.py test_import_boundary.py -q
