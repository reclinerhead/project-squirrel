name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcc
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: mcc/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install pytest
      # Only the daemon's pure-logic tests run in CI. They import stdlib-only
      # modules (storage.py), so no ultralytics/opencv install is needed. Tests
      # that touch the model or camera stay local, not in CI.
      - run: pytest test_storage.py -q
