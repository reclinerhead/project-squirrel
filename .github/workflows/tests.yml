name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcc
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: mcc/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # The full pure-logic suite: storage, perception bookkeeping, the daemon
      # against the synthetic frame source, narrator pacing/templates, and the
      # replay timing math. CI needs fastapi/opencv/paho/yaml but NOT
      # ultralytics/torch -- headless opencv avoids the libGL requirement of
      # the full build. Model- and camera-dependent code stays out of CI,
      # verified locally. (Deps listed inline rather than requirements.txt
      # precisely because of the opencv-python -> headless swap.)
      - run: pip install pytest httpx fastapi "uvicorn[standard]" numpy opencv-python-headless paho-mqtt pyyaml
      - run: pytest test_storage.py test_perception.py test_daemon.py test_narrator.py test_replay.py -q
