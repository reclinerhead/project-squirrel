# =============================================================================
# project-squirrel -- genre_rules.yaml (issue #163)
#
# THE GENRE VOCABULARY IS DATA, NOT CODE. This file is the owner's live
# ruleset: the canonical tags the whole app speaks, the mapping from the
# library's 178 feral iTunes strings into them (measured complete against
# the live catalog, 2026-07-18), and the playlist engine's genre families. Edit it, re-run `python3 -m jukebox.music_genre`, and every
# non-owner row remaps under the new rules -- that IS the backfill job; there
# is no other tool. Rule changes are commits, so every genre opinion ever
# revised has a diff and a date.
#
# A second deployment (a friend's metal-heavy library wanting six metal
# subgenres and two electronica buckets) is a DIFFERENT FILE, never a code
# change: point MERLE_MUSIC_GENRE_RULES (or --rules) at your own copy.
#
# Sections (five required; artist_display optional; unknown ones rejected):
#   vocabulary        the canonical tag list. Nothing else may hardcode it.
#   map               canonical tag -> the raw strings that mean it. A raw
#                     string may appear ONCE across the whole map.
#   artist_overrides  artist -> canonical, for judgment calls no string map
#                     can express. Beats the string map. This is also where
#                     the future curation of the ~116 unresolved artists
#                     lands -- rules, not one-off DB writes. Matched
#                     case-insensitively since #152.
#   clusters          genre FAMILIES for playlist affinity (music_playlist).
#                     A custom vocabulary needs custom families, so they
#                     travel together.
#   tuning            inherit_threshold: the artist-majority bar for tracks
#                     whose raw tag maps nowhere. triage: raw strings KNOWN
#                     to be unmappable junk drawers -- kept out of the
#                     unmapped report, left NULL for the bulk-metadata
#                     backfill (they are deferred, not forgotten).
#   artist_display    artist -> the display casing you want (issue #152).
#                     The pass collapses case-duplicate artists to their
#                     most-frequent casing automatically; this section is
#                     the taste veto (the library says `Gwar` 106-32, the
#                     band says GWAR) and the pin against a future import
#                     flipping a winner. The override must be the SAME
#                     artist (case-insensitively) as its key.
#
# Raw strings with backslashes are single-quoted -- YAML double quotes would
# treat \T as an escape. Two-space gaps (`DUBSTEP  GRIME`) are real: the
# indexer's norm_tag() trims ends but preserves inner spacing, and matching
# is exact.
# =============================================================================

vocabulary:
  - Rock
  - Classic Rock
  - Progressive Rock
  - Alternative
  - Indie
  - Punk
  - Metal
  - Industrial
  - Pop
  - Electronic
  - Downtempo
  - Dance
  - Hip-Hop
  - R&B/Soul
  - Jazz
  - Blues
  - Classical
  - Country
  - Folk
  - World
  - Reggae
  - Soundtrack

