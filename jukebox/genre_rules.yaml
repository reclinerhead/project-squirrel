    - Synth-pop
    - Pop Rock
    - 'Rock\Pop'                 # Nelly Furtado, Duran Duran
    - Rock / Pop
    - Pop Female Singer-Songwriter
    - like no other              # Imogen Heap
    - Electronic, Pop
    - 'Electronica\Pop'          # Ladytron, Hot Chip -- synth-pop end of the pool
    - 'Pop\Electronic'
    - Electronic/Pop
    - Electronic Pop Rock
  Electronic:
    - Electronica
    - Electronic
    - Electro
    - 'Electronica\DJ'
    - Electronica/DJ
    - 'Experimental\Electronic'
    - Electronic, Alternative
    - Electronic, Experimental
