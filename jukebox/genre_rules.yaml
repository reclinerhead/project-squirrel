    - Electronica/Trip-Hop
    - 'Electronica\Trip-Hop'
    - Electronica / Lounge
    - 'Electronica\Lounge'
    - 'Electronica\Chill'
    - Trip-Hop
    - Lounge
    - Downtempo
    - Ambient
    - 'Electronica\Dub'
