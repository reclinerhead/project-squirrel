# Artist-level judgment calls. Empty today -- the string map plus inheritance
# covers the current library, and the ~116 artists neither can reach are the
# bulk-metadata pass's worklist. When that curation happens, it lands HERE:
#   artist_overrides:
#     Supertramp: Classic Rock
#     Iron & Wine: Folk
artist_overrides: {}

# Playlist-affinity families over the CANONICAL vocabulary (music_playlist's
# cluster bonus; injected by the daemon so a custom vocabulary brings its own
# families). The first family is the measured electronic/hip-hop cluster that
# fixed Queensryche-at-#2 for a Stereo MC's seed, restated in canonical terms;
# the rock family is its obvious sibling now that the vocabulary can name one.
clusters:
  - [Electronic, Downtempo, Dance, Industrial, Hip-Hop, R&B/Soul]
  - [Rock, Classic Rock, Progressive Rock, Alternative, Indie, Punk]

# Display-casing vetoes (issue #152). Empty means "most frequent casing
# wins" everywhere -- add a line when the library's majority has bad taste:
#   artist_display:
#     GWAR: GWAR            # the library says Gwar 106-32; the band disagrees
artist_display: {}

tuning:
  # A track whose raw tag maps nowhere inherits its artist's genre when at
  # least this share of the artist's MAPPED tracks agree (measured: 0.6
  # resolves 1,521 of the 3,410 triage tracks with no wrong calls sampled).
  inherit_threshold: 0.6
  # Junk drawers that must never be string-mapped: Pop\Rock is AllMusic's
  # catch-all (Violent Femmes / Skinny Puppy / Fear Factory / Prince side by
  # side), the rest are import artifacts. Known and deferred -- excluded from
  # the unmapped report, left NULL for the bulk-metadata backfill.
  triage:
    - 'Pop\Rock'
    - Pop/Rock
    - Styles
    - Popular
    - Other
