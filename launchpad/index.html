<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0c1310" />
  <title>Homestead</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230c1310'/%3E%3Cpath d='M16 6 L27 15 H24 V26 H8 V15 H5 Z' fill='none' stroke='%236be585' stroke-width='2' stroke-linejoin='round'/%3E%3C/svg%3E" />
  <link rel="preload" href="fonts/fraunces-latin-var.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="fonts/sometype-mono-latin-var.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- The icon shelf: house line-work, stroke inherits currentColor so each
       tile's ink rules apply. A tile whose icon key isn't on the shelf falls
       back to the signpost, so a new tiles.json entry never needs code. -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="icon-binoculars" viewBox="0 0 24 24">
        <circle cx="7" cy="16.5" r="3.4" />
        <circle cx="17" cy="16.5" r="3.4" />
        <path d="M4.6 14 6 7h2.4l.8 6M19.4 14 18 7h-2.4l-.8 6M9.8 13.5h4.4M12 13.5v-3" />
      </symbol>
      <symbol id="icon-note" viewBox="0 0 24 24">
        <path d="M9.4 17.2V6.6l8.4-2.1v10.6" />
        <circle cx="7.2" cy="17.4" r="2.3" />
        <circle cx="15.6" cy="15.3" r="2.3" />
      </symbol>
      <symbol id="icon-sky" viewBox="0 0 24 24">
        <circle cx="8" cy="8" r="3" />
        <path d="M8 2.6v1.6M2.6 8h1.6M4.2 4.2l1.1 1.1M11.8 4.2l-1.1 1.1" />
        <path d="M9.5 18.5h7.9a3.1 3.1 0 0 0 .4-6.2 4.4 4.4 0 0 0-8.6 1 2.7 2.7 0 0 0 .3 5.2Z" />
      </symbol>
      <symbol id="icon-mound" viewBox="0 0 24 24">
        <path d="M3 19c2-5.5 5-8.5 9-8.5s7 3 9 8.5" />
        <ellipse cx="12" cy="19" rx="3.4" ry="1.3" />
        <path d="M6.2 12.4l-1.3-1.1M9.3 9.9 8.5 8.4M14.7 9.9l.8-1.5M17.8 12.4l1.3-1.1" />
      </symbol>
      <symbol id="icon-hearth" viewBox="0 0 24 24">
        <path d="M12 4.5c.4 2.4 3.9 3.9 3.9 7.3a3.9 3.9 0 0 1-7.8 0c0-1.5.7-2.6 1.6-3.7.1 1 .5 1.7 1.2 2.2-.2-2.2.2-4.2 1.1-5.8Z" />
        <path d="M5.5 18.7h13M7 21h10" />
      </symbol>
      <symbol id="icon-tower" viewBox="0 0 24 24">
        <path d="M7.5 9.5h9L12 4.5Z" />
        <path d="M8.5 9.5v4h7v-4M10.5 11h3" />
        <path d="M9 13.5 6.5 21M15 13.5 17.5 21M7.8 17.8h8.4" />
      </symbol>
      <symbol id="icon-bird" viewBox="0 0 24 24">
        <path d="M4 20h16" />
        <path d="M11.5 20v-2.2" />
        <path d="M11.5 17.8c-2.8-.4-4.4-2.5-4.4-5.2 0-3 2.2-5.1 4.9-5.1 1.9 0 3.3.9 4.1 2.3l2.9 1-2.4 1.5c-.2 3.3-2 5.2-5.1 5.5Z" />
        <circle cx="13.4" cy="9.9" r="0.5" />
      </symbol>
      <symbol id="icon-signpost" viewBox="0 0 24 24">
        <path d="M12 21V4.5" />
        <path d="M12 6h6.8l2 2.2-2 2.2H12M12 12h-6.8l-2 2.2 2 2.2H12" />
      </symbol>
    </defs>
  </svg>

  <div class="wrap">
    <header class="masthead">
      <h1>Homestead</h1>
      <p class="stamp sub">project squirrel · the front porch · every trail starts here</p>
    </header>

    <main id="tiles" class="grid" aria-label="The homestead's modules">
      <noscript>
        <p class="empty stamp">the porch needs javascript to lay its tiles</p>
      </noscript>
    </main>

    <footer class="foot stamp">
      pearl · basement rack · always on
    </footer>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
