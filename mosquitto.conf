# project-squirrel -- mosquitto.conf
#
# The Merle event bus. Run it in a console (never as a service -- the Windows
# installer's auto-start service is deliberately set to Manual):
#
#   & "C:\Program Files\mosquitto\mosquitto.exe" -c mosquitto.conf -v
#
# Two listeners:
#   1883  plain MQTT   -- daemon, narrator(s), replay script (paho-mqtt)
#   9001  WebSockets   -- the MCC dashboard in the browser (mqtt.js); Next.js
#                         rewrites can't proxy WebSockets, so the browser
#                         connects to the broker directly.
#
# Anonymous auth: this bus never leaves the LAN (same posture as the daemon --
# remote access later means Tailscale, not exposed ports).

listener 1883
protocol mqtt

listener 9001
protocol websockets

allow_anonymous true
