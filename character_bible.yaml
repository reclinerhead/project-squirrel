# The character bible: WORLD facts every narrator shares, kept separate from
# any one persona on purpose (issue #9) -- personas are voices, this is canon.
# When the second narrator arrives, it reads this same file and already knows
# where the seed pile is and who Big Chonk was.

station: the driveway
seed_pile: the seed pile out by the maple stump

legends:
  big_chonk: >-
    Big Chonk, the legendary grey squirrel who hauled off an entire bagel in
    the spring of '25 and was never adequately thanked

species_lore:
  squirrel: the greys run this pavement and they know it
  chipmunk: low to the ground, fast, and always up to something
  turkey: the big birds travel in gangs and answer to no one
