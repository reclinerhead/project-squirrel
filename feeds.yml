# =============================================================================
# project-squirrel -- feeds.yml (issue #270)
#
# Every video/audio feed in the house, and which consumers may use it. This
# is the ONLY place a feed is declared -- consumers (feeds.py's callers)
# dispatch on a feed's `kind`, never on its name, so adding camera #3 or
# retiring a mic is an edit here, not a code change.
#
# Camera credentials live in Frigate's config (issue #247): Frigate holds the
# only sessions to the cameras and republishes them credential-free at
# rtsp://pearl:8554/<name>. The URLs below use the hostname form on purpose --
# it resolves on pearl itself as well as on the dev boxes, so this one
# committed file serves every machine.
#
# A feed's name doubles as its published source label (audio/events, the bird
# record's `source` column, the clip directory under MERLE_EARL_CLIPS), so
# renaming one is a data migration (#270's runbook: Servers/Pearl.md) --
# choose names that will stay.
#
# Kinds:
#   rtsp     -> url  the go2rtc restream; Earl pulls the audio track, the
#                    naturalist decodes the video
#   command  -> cmd  a shell capture producing s16le/48kHz/mono on stdout
#                    (the rover's ssh+arecord pull)
#
# Flags (absent = false):
#   earl: true        Earl runs BirdNET on this feed's audio. This flag is
#                     the CPU dial -- flip house-front to false and redeploy
#                     to drop Earl back to one camera, no code change.
#   naturalist: true  the vision daemon's video source (exactly one feed;
#                     feeds.py enforces it).
#
# MERLE_FEEDS points a process at an alternate registry file -- tests, a dev
# variant, or the break-glass direct-camera file for a Frigate that's down
# (see docs/guide/earl.md).
# =============================================================================

feeds:
  # The rear camera (192.168.1.102, watching the driveway) -- Earl's first
  # ear since #172 (as "amcrest" before #270) and the naturalist's one and
  # only video source.
  house-rear:
    kind: rtsp
    url: rtsp://pearl:8554/house-rear
    earl: true
    naturalist: true

  # The front-door camera (192.168.1.173, added by #269). Audio only for
  # now -- deliberately NOT a naturalist feed; squirrel/turkey detection
  # stays a one-camera affair.
  house-front:
    kind: rtsp
    url: rtsp://pearl:8554/house-front
    earl: true

  # The rover's own USB-camera mic, arecord piped over ssh (Phase 0 D5: the
  # JMTek dongle is silent; plughw:0,0 is the camera). BatchMode + the
  # ServerAlive pair are load-bearing (issue #201): merle powering down
  # mid-capture half-opens the TCP, and without them ssh waits on the
  # kernel's ~2-hour keepalive instead of exiting in ~15s.
  rover:
    kind: command
    cmd: >-
      ssh -o BatchMode=yes -o ConnectTimeout=5 -o ServerAliveInterval=5
      -o ServerAliveCountMax=3 todd@merle
      arecord -D plughw:0,0 -f S16_LE -r 48000 -c 1 -t raw -q
    earl: true
